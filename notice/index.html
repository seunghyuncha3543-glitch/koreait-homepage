<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회사 공고 | KOREA IT</title>
  <meta name="description" content="주식회사 코리아아이티의 정관 및 관련 법령에 따른 공고 사항 페이지입니다.">
  <meta property="og:title" content="회사 공고 | KOREA IT">
  <meta property="og:description" content="주식회사 코리아아이티 공식 공고 페이지">
  <meta property="og:image" content="../assets/og-image.jpg">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-logo" href="../index.html"><img src="../assets/logo-horizontal.svg" alt="KOREA IT"></a>
      <nav class="main-nav">
        <ul>
          <li><a href="../index.html">홈</a></li>
          <li><a href="../ja/index.html">日本語</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <!--
        [공고 페이지 안내 문구]
        회사 공고 페이지의 제목/설명입니다.
        법무/총무팀 요청으로 문구를 바꿔야 할 때는 아래 h1/p 내용을 수정하면 됩니다.
      -->
      <h1 class="section-title">회사 공고</h1>
      <p class="section-lead">주식회사 코리아아이티의 정관 및 관련 법령에 따른 공고 사항을 게시합니다.</p>

      <!--
        [공고가 없을 때 표시되는 안내 박스]
        notice-data.js의 notices 배열이 비어 있으면 이 박스가 자동으로 보입니다.
      -->
      <div id="notice-empty" class="notice-empty" hidden>현재 등록된 공고가 없습니다.</div>

      <!--
        [공고 목록 표]
        표 내용은 notice-data.js에 있는 notices 배열을 읽어서 자동으로 채워집니다.
        직접 HTML 행(tr)을 추가하지 않아도 됩니다.
      -->
      <table class="notice-table">
        <thead>
          <tr>
            <th>게시일</th>
            <th>제목</th>
            <th>상세보기</th>
            <th>첨부파일</th>
          </tr>
        </thead>
        <tbody id="notice-list"></tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="../index.html">메인으로</a>
    </div>
  </footer>

  <script src="notice-data.js"></script>
  <script>
    /*
      [공고 목록 자동 출력]
      1) notice-data.js 파일의 notices 배열을 읽습니다.
      2) notices가 비어 있으면 "현재 등록된 공고가 없습니다."를 보여줍니다.
      3) notices에 항목이 있으면 표에 자동으로 행을 만들어 넣습니다.

      코딩 초보자를 위한 팁:
      - 공고를 추가/수정할 때는 이 파일보다 notice-data.js를 먼저 수정하세요.
      - 이 스크립트는 데이터를 화면에 그려주는 역할만 담당합니다.
    */
    (function renderNotices() {
      const tableBody = document.getElementById('notice-list');
      const emptyBox = document.getElementById('notice-empty');
      const safeNotices = Array.isArray(window.notices) ? window.notices : [];

      if (safeNotices.length === 0) {
        emptyBox.hidden = false;
        tableBody.innerHTML = '';
        return;
      }

      emptyBox.hidden = true;

      tableBody.innerHTML = safeNotices.map(function (notice) {
        const detailLink = notice.url ? '<a href="' + notice.url + '">상세보기</a>' : '-';
        const attachmentLink = notice.attachment
          ? '<a href="' + notice.attachment + '" target="_blank" rel="noopener">첨부파일</a>'
          : '-';

        return '<tr>' +
          '<td>' + (notice.date || '-') + '</td>' +
          '<td>' + (notice.title || '-') + '</td>' +
          '<td>' + detailLink + '</td>' +
          '<td>' + attachmentLink + '</td>' +
          '</tr>';
      }).join('');
    })();
  </script>
</body>
</html>
